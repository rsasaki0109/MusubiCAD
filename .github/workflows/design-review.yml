name: Design Review

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - examples/bracket.ocad.d/**
      - examples/agent/review_width_patch.json
      - modules/cli/src/review.rs
      - modules/cli/src/commands.rs
      - .github/workflows/design-review.yml

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  WGPU_BACKEND: vulkan

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Mesa Vulkan (headless wgpu)
        run: sudo apt-get update && sudo apt-get install -y libvulkan1 mesa-vulkan-drivers

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-design-review-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-design-review-
            ${{ runner.os }}-cargo-

      - name: Generate flagship design review
        run: >-
          cargo run -p opencad-cli -- review
          examples/bracket.ocad.d
          examples/agent/review_width_patch.json
          --output design-review

      - name: Publish job summary
        if: ${{ always() && hashFiles('design-review/github-summary.md') != '' }}
        run: cat design-review/github-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload review bundle
        if: ${{ always() && hashFiles('design-review/review.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: musubicad-design-review-${{ github.run_id }}
          path: design-review/
          if-no-files-found: error
          retention-days: 14
