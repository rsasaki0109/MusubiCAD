name: Design Review

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  WGPU_BACKEND: vulkan

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Mesa Vulkan (headless wgpu)
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y imagemagick libvulkan1 mesa-vulkan-drivers

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-design-review-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-design-review-
            ${{ runner.os }}-cargo-

      - name: Generate and verify flagship design review
        run: ./docs/assets/verify-review-demo.sh

      - name: Verify zero-build quick start
        run: ./quickstart.sh --check

      - name: Publish job summary
        if: ${{ always() && hashFiles('docs/assets/review-demo/github-summary.md') != '' }}
        run: cat docs/assets/review-demo/github-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload review bundle
        if: ${{ always() && hashFiles('docs/assets/review-demo/review.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: musubicad-design-review-${{ github.run_id }}
          path: docs/assets/review-demo/
          if-no-files-found: error
          retention-days: 14
