name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Mesa Vulkan (headless wgpu)
        run: sudo apt-get update && sudo apt-get install -y libvulkan1 mesa-vulkan-drivers

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Example documents
        run: cargo test -p opencad-file example_ && cargo test -p opencad-cli example_

      - name: Golden regression
        run: cargo test -p opencad-feature golden_ && cargo test -p opencad-cli golden_

      - name: Render regression
        run: cargo test -p opencad-render

      - name: Test
        run: cargo test --workspace
