<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForgeCAD</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="brand">
        <strong>ForgeCAD</strong>
        <span class="subtitle">Desktop preview</span>
      </div>
      <div class="actions">
        <button id="open-btn" type="button">Open…</button>
        <button id="refresh-btn" type="button">Regenerate</button>
        <button id="undo-btn" type="button" disabled>Undo</button>
        <button id="redo-btn" type="button" disabled>Redo</button>
        <button id="viewport-btn" type="button">3D viewport</button>
        <select id="template-select" aria-label="Template"></select>
        <button id="create-btn" type="button">Create sample</button>
      </div>
    </header>

    <main class="layout">
      <section class="preview-panel">
        <div class="preview-frame">
          <img id="preview" alt="Model preview" title="Click to pick geometry" />
          <svg
            id="highlight-overlay"
            class="highlight-overlay"
            viewBox="0 0 960 540"
            preserveAspectRatio="xMidYMid meet"
            aria-hidden="true"
          ></svg>
        </div>
        <p id="pick-hint" class="pick-hint">
          Click the preview or 3D viewport to inspect faces and sketch lines.
        </p>
        <p id="status" class="status">Loading…</p>
      </section>
      <aside class="info-panel">
        <h2>Document</h2>
        <dl id="doc-info"></dl>
        <h2>Preview</h2>
        <dl id="preview-info"></dl>
        <h2>Parameters</h2>
        <div id="parameters" class="parameters"></div>
        <h2>Selection</h2>
        <dl id="selection-info"></dl>
      </aside>
    </main>

    <script src="main.js"></script>
  </body>
</html>
